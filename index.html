<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Consultation - KJS Accounting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #141414 0%, #1a1a1a 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        .form-wrapper {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h1 {
            color: #141414;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #141414;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: #00c4cc;
            box-shadow: 0 0 0 3px rgba(0, 196, 204, 0.1);
        }

        .radio-group,
        .checkbox-group {
            margin: 12px 0;
        }

        .radio-label,
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin: 10px 0;
            font-weight: normal;
        }

        .radio-label input,
        .checkbox-label input {
            margin-right: 10px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .required {
            color: #e74c3c;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00c4cc, #7d2ae8);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 196, 204, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .form-note {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
        }

        .back-link {
            text-align: center;
            margin-bottom: 30px;
        }

        .back-link a {
            color: #00c4cc;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #7d2ae8;
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
                margin: 20px auto;
            }

            .form-wrapper {
                padding: 25px;
            }

            .form-header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-link">
            <a href="https://kjsaccounting.my.canva.site/">← Back to Home</a>
        </div>

        <div class="form-wrapper">
            <div class="form-header">
                <h1>Get Your Free Consultation</h1>
                <p>Tell us about your accounting needs and we'll get back to you within 24 hours</p>
            </div>

            <form action="https://formsubmit.co/kjsacctg@gmail.com" method="POST">
                <!-- FormSubmit.co Configuration -->
                <input type="hidden" name="_next" value="https://kjsaccounting.com/">
                <input type="hidden" name="_subject" value="New Consultation Request - KJS Accounting">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_autoresponse" value="Thank you for your interest in KJS Accounting! We received your inquiry and will contact you within 24 hours.">

                <!-- Full Name -->
                <div class="form-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>

                <!-- Email Address -->
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" required placeholder="(323) 205-5698">
                </div>

                <!-- Business vs Personal -->
                <div class="form-group">
                    <label><span class="required">*</span> Account Type</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="account_type" value="Business" required>
                            <span>Business</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="account_type" value="Personal" required>
                            <span>Personal</span>
                        </label>
                    </div>
                </div>

                <!-- Free Consultation Interest -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="free_consultation" value="Yes">
                        <span>I'm interested in a free consultation</span>
                    </label>
                </div>

                <!-- Optional: Message -->
                <div class="form-group">
                    <label for="message">Additional Details</label>
                    <input type="text" id="message" name="message" placeholder="Tell us about your accounting needs (optional)">
                </div>

                <!-- Submit Button -->
                <button type="submit">Request Consultation</button>
                <p class="form-note">We'll respond within one business day</p>
            </form>
        </div>
    </div>
</body>
</html>
